# DayNightControl
# Minecraft vanilla: day 10m, night roughly 10m if dusk/dawn are grouped with night.
# This plugin controls the clock directly so you can choose any lengths.

default:
  enabled: true
  day-minutes: 10.0
  night-minutes: 10.0
  # Seconds to wait after enough players are sleeping before fast-forward starts.
  sleep-delay-seconds: 0.0
  # The remaining night is spread across this many real seconds while players are sleeping.
  sleep-fast-forward-seconds: 5.0

# Optional per-world overrides.
# worlds:
#   world:
#     enabled: true
#     day-minutes: 20.0
#     night-minutes: 5.0
#     sleep-delay-seconds: 0.0
#     sleep-fast-forward-seconds: 5.0
worlds: {}
